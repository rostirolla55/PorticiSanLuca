<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="pageTitle">
        Map - Quadrilatero
    </title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <div id="loading-message">
        <p>
            loading map ...
        </p>
    </div>
    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group">
                <button aria-label="Apri menu" class="menu-toggle">
                    <span class="bar">
                    </span>
                    <span class="bar">
                    </span>
                    <span class="bar">
                    </span>
                </button>
                <a class="map-link" href="mappa-en.html" id="mapNavLink">
                    <svg class="pin-icon" viewbox="0 0 24 24">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z">
                        </path>
                    </svg>
                </a>
            </div>
            <div class="right-header-group">
                <div class="language-selector">
                    <button data-lang="it">
                        <img alt="Italiano" src="public/flag/it.png" />
                    </button>
                    <button data-lang="en">
                        <img alt="English" src="public/flag/en.png" />
                    </button>
                    <button data-lang="es">
                        <img alt="Espa&ntilde;ol" src="public/flag/es.png" />
                    </button>
                    <button data-lang="fr">
                        <img alt="Fran&ccedil;ais" src="public/flag/fr.png" />
                    </button>
                </div>
            </div>
            <nav class="nav-bar-main" id="navBarMain">
                <div class="nav-bar-content">
                         <ul>
      <li>
       <a href="index-en.html" id="navHome">Welcome</a>
      </li>
      <li>
       <a href="psontuoso-en.html" id="navPSontuoso">Sumptuous Gate</a>
      </li>
     </ul>
                </div>
            </nav>
            <div class="nav-bar-nearby" id="nearbyMenuPlaceholder">
            </div>
        </header>
        <main class="content-body">
            <div class="header-image-container">
                <img class="header-image-sfumata" id="headImage" src="public/images/Meloncello.jpg" />
                <h1 class="header-title" id="headerTitle">
                    Map of Places
                </h1>
            </div>
            <div class="main-content-area">
                <p id="mainMapsDesc" style="margin-bottom: 20px; font-style: italic;">
                </p>
                <div class="map-container"
                    style="position: relative; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
                    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
                    </script>
                    <div id="map"
                        style="height: 500px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
                    </div>
                </div>
                <footer class="info-footer">
                    <p>
                        &copy; 2026 - Bologna Quadrilatero - Versione Beta
                    </p>
                </footer>
            </div>
        </main>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const currentLang = document.documentElement.lang || 'it';

                // 1. Centriamo la mappa sulla zona di San Luca/Meloncello
                // [44.490, 11.325] è una posizione intermedia tra i tuoi due POI
                const map = L.map('map').setView([44.490, 11.325], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                try {
                    // 2. Usiamo lo stesso percorso di main.js per i testi
                    // Se texts.json è nella root, lascia 'texts.json'. 
                    // Se è nella sottocartella, usa 'data/translations/' + currentLang + '/texts.json'
                    const [poisRes, textsRes] = await Promise.all([
                        fetch('pois_config.json'),
                        fetch(`data/translations/${currentLang}/texts.json`).catch(() => fetch('texts.json'))
                    ]);

                    const poisData = await poisRes.json();
                    const textsData = await textsRes.json();
                    const navTitles = textsData.nav || {};

                    poisData.pois.forEach(poi => {
                        const title = navTitles[poi.nav_id] || poi.id;
                        const marker = L.marker([poi.lat, poi.lon]).addTo(map);

                        marker.bindTooltip(title, {
                            direction: 'top',
                            sticky: true,
                            className: 'map-tooltip'
                        });

                        marker.on('click', () => {
                            const langSuffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                            window.location.href = `${poi.base_name}${langSuffix}.html`;
                        });
                    });

                } catch (error) {
                    console.error("Errore nel caricamento dei dati mappa:", error);
                    // Suggerimento: se vedi questo errore in console, controlla i percorsi dei file JSON
                }
            });
        </script>
        <script src="main.js" type="module">
        </script>
    </div>
</body>

</html>
