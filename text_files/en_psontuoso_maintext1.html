<p style="line-height: 116%; margin-bottom: 0.28cm">
The <b>Portone Sontuoso </b>is much more than a simple entrance; it's
the imposing &quot;calling card&quot; that marks the start of
Bologna's most iconic climb. Located on Via Saragozza, it's the exact
point where the portico separates from the city to begin its ascent
toward Colle della Guardia.</p>
