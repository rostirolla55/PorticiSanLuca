<p style="line-height: 116%; margin-bottom: 0.28cm">
Il <b>Portone Sontuoso</b> è molto più di un semplice ingresso; è
l’imponente &quot;biglietto da visita&quot; che dà il via alla
salita più iconica di Bologna. Situato in via Saragozza, è il punto
esatto in cui il portico si stacca dalla città per iniziare la sua
ascesa verso il Colle della Guardia.</p>
