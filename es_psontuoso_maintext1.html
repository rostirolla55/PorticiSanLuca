<p style="line-height: 116%; margin-bottom: 0.28cm">
El <b>Portone Sontuoso </b>es mucho más que una simple entrada; es
la imponente tarjeta de visita que marca el inicio de la subida más
emblemática de Bolonia. Ubicado en Via Saragozza, es el punto exacto
donde el pórtico se separa de la ciudad para iniciar su ascenso
hacia el Colle della Guardia.</p>
